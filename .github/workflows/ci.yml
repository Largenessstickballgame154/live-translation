name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt numpy sounddevice soundfile

      - name: Lint
        run: ruff check .

      - name: Type check
        run: pyright

      - name: Tests
        run: pytest
